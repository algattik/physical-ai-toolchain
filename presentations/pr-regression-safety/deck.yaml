- id: dependency-intake
  kind: section
  part: Phase 0
  title: Dependency intake
  sub: From blind wildcard intake to risk-aware grouping — config only, ~$0
  notes: Phase zero changes how dependencies arrive. It is pure configuration and ships in an afternoon.
- id: intake-has-no-risk-signal
  kind: bullets
  accent: '#C4314B'
  title: Intake has no risk signal
  body: |-
    - 21 ecosystem blocks, every one a wildcard catch-all — no split by risk
    - A harmless patch and a CUDA-breaking major are batched identically
    - ~7 ignore-pins added only after a breakage (torch, numpy, marshmallow…)
    - No stability window: a bump can open the day it is published
  notes: Today every block batches by ecosystem, not by risk, so a patch and a major land in the same pull request and the same review. The seven ignore-pins were all reactive — added after a break, never before. And there is no cooldown, so a freshly published version can open a pull request the same day. The fix is to give intake the risk signal it lacks.
- id: what-others-do-group-by-risk-add-a-cooldown
  kind: code
  accent: '#5C2E91'
  title: What others do — group by risk, add a cooldown
  caption: 'Real, copyable config: vercel/ai splits prod vs dev; huggingface/transformers adds a window'
  file: vercel/ai  ·  huggingface/transformers
  code: |2

    # vercel/ai - split production vs development (npm)
    groups:
      packages-production:
        dependency-type: production
        update-types: [minor, patch]
      packages-development:
        dependency-type: development
        update-types: [minor, patch]
    # huggingface/transformers - 7-day stability window
    cooldown:
      default-days: 7
  notes: The pattern to copy is settled. Vercel's AI SDK splits production from development dependencies and batches minor and patch together. HuggingFace transformers adds a seven-day cooldown, a stability window before a bump opens. Both are real configuration files, not advice — we can lift them directly.
- id: recommendation-split-by-risk-keep-security-fast
  kind: codecompare
  accent: '#107C10'
  title: Recommendation — split by risk, keep security fast
  caption: Batch the safe, isolate majors, add a window — and never batch security
  left_head: Today — wildcard catch-all
  left_accent: '#C4314B'
  left_code: |2

    groups:
      training-deps:
        patterns: ["*"]
    ignore:
    - dependency-name:
        marshmallow
      versions: [">=4.0.0"]
    # x21 blocks
    # patch == major
  right_head: Proposed — risk split + cooldown
  right_accent: '#107C10'
  right_code: |2

    groups:
      prod-min-patch:
        dependency-type:
          production
        update-types:
          [minor, patch]
    # majors isolated
    cooldown:
      default-days: 7
    # security: ungrouped
  notes: 'Side by side: on the left, one wildcard group per ecosystem, patches and majors treated alike. On the right, update types are split so patches and minors batch into one auto-mergeable pull request while majors are isolated for review, a seven-day cooldown is added, and — the firm rule — security updates stay ungrouped and fast-tracked, never held in a weekly batch. This is configuration only; it removes the noise that hides the dangerous bump.'
- id: renovate-a-scoped-spike-not-a-switch
  kind: deflist
  accent: '#9D5D00'
  title: Renovate — a scoped spike, not a switch
  caption: One real residual gap; weigh it on evidence (full adoption data in the appendix)
  label_w: 3.4
  label_size: 13.5
  desc_size: 13
  rows:
  - - The gap
    - Dependabot groups are per-ecosystem — still 4+ PRs/cycle; no one-config view
  - - Not the gap
    - uv support — Dependabot has it since 2025 and this repo already uses it
  - - The cost
    - the Mend App needs org approval; renovatebot/github-action avoids it entirely
  - - The decision
    - time-boxed spike via the Action; switch only if PR volume drops without losing the security lane
  notes: 'One alternative deserves a place, not a section. Renovate''s single real edge here is cross-ecosystem grouping: one config across npm, Python, Terraform, and Go, where Dependabot needs a block each. What is not the edge is uv — Dependabot has supported it since twenty-twenty-five and this repo relies on it. The friction is organizational: the hosted app needs approval, but a self-hosted Action sidesteps that. So the recommendation is a time-boxed spike that switches only if it measurably cuts pull-request volume without weakening the security lane. The adoption evidence is in the appendix.'
- id: gpu-free-smoke-gate
  kind: section
  part: Phase 1
  title: GPU-free smoke gate
  sub: Catch the resolution, import, and interpreter breaks on every PR — ~$0
  notes: Phase one is the cheap gate that catches the expensive interpreter class, with no GPU and no Azure.
- id: a-green-check-tests-nothing-real
  kind: bullets
  accent: '#C4314B'
  title: A green check tests nothing real
  body: |-
    - All test CI is CPU-only ubuntu-latest — no GPU, no Isaac, no real runtime image
    - The interpreter and ABI breaks fail on the real runtime, which CI never loads
    - Path-filter bugs (#691, #547) switched tests off for weeks — still green
    - So the gate must run inside the real image, not a generic runner
  notes: 'The pipeline''s blind spot is structural. It runs on a generic Ubuntu image with a generic Python, while the breaks that hurt happen on Isaac''s own three-eleven runtime, which CI never loads. And when a path filter misfired, the pipeline reported green while testing nothing. The conclusion writes the design: to catch these, the smoke gate has to run inside the actual runtime image.'
- id: two-depths-tier-0-and-tier-1
  kind: twocol
  accent: '#0078D4'
  title: 'Two depths: Tier 0 and Tier 1'
  left_head: Tier 0 — venv, seconds, every PR
  left_accent: '#107C10'
  left_body: |-
    - `uv lock --check` — resolution drift *(today)*
    - YAML schema-validate, `shellcheck` *(today)*
    - import in a CPU venv + `--help` *(add)*
    - Mostly already on — one probe to add
    - Caveat: CPU wheels ≠ the production CUDA graph
  right_head: Tier 1 — inside the real image, minutes
  right_accent: '#0078D4'
  right_body: |-
    - `docker run` the ACTUAL runtime image *(add)*
    - reinstall the PR's lock as prod does
    - import on the real interpreter (Isaac = 3.11)
    - Catches #809, probably #790 — deterministically
    - Path-gated; bounded by disk, not capability
  notes: 'CPU smoke has two depths, and conflating them is how a green check misleads. Tier zero already runs on every pull request — the lock-check, the YAML and schema validation, shellcheck are all in the pipeline today. What is missing from it is one cheap probe: import the changed code in a CPU virtual environment and run its `--help`. That is the only new line in Tier zero. But state Tier zero''s limit plainly: it installs CPU wheels, so it is checking a different dependency graph than production''s CUDA one; it catches import and resolution errors, not the production resolution. Tier one is the genuinely new tier, and the one that mirrors production: it pulls the real image and reinstalls the pull request''s lock exactly as the training job does, on the real interpreter. That tier deterministically catches the interpreter class, eight-oh-nine and probably seven-ninety. Its limit is disk, not capability.'
- id: tier-1-import-inside-the-real-image
  kind: code
  accent: '#107C10'
  title: Tier 1 — import inside the real image
  caption: 'The recipe that catches the #809 class — no GPU; it fails at import'
  file: 'Proposed: isaac-import-smoke.sh'
  code: |2

    # Pull the REAL runtime image and reinstall the PR's lock the way prod does,
    # then run the launcher's import-check mode (same graph as training, stops
    # before AppLauncher — the only GPU step).
    docker run --rm --platform linux/amd64 \
      nvcr.io/nvidia/isaac-lab:2.3.2 bash -lc '
        /isaac-sim/kit/python/bin/python3 -V        # 3.11 — the real runtime
        uv export --frozen --no-emit-project --directory training/rl \
          | uv pip install --system --no-deps -r -  # <- the #809 3.12-lock fails HERE
        python -m training.rl.scripts.launch --mode import-check  # ABI net: graph loads?
    '   # all on CPU — no GPU touched
  code_size: 12
  notes: 'Concretely, for the hardest environment: pull the real Isaac image and reinstall the pull request''s lock with no-deps, exactly as the training job does, on the real three-eleven interpreter. That install step is the circuit breaker for the interpreter and marker class — eight-oh-nine was a lock resolved for three-twelve, and it fails right here, before anything imports, on a CPU agent. The import-check mode is the follow-on net: it runs the real launcher far enough to load the Isaac, SKRL, and gym graph, then stops before AppLauncher, the only GPU step — catching a package that installs but will not load on the runtime. Neither step needs a GPU.'
- id: we-ran-it-it-catches-809-on-cpu
  kind: code
  accent: '#107C10'
  title: 'We ran it — it catches #809 on CPU'
  caption: Executed this session inside the actual Isaac image, CPU only
  file: prototype result (this session)
  code: |2

    # EXECUTED inside nvcr.io/nvidia/isaac-lab:2.3.2 (amd64 emulated), CPU only:
    $ docker run ... --entrypoint .../python3 isaac-lab:2.3.2 -c 'print(sys.version)'
      3.11.13                         # the real Isaac runtime

    $ pip install .   # a dep with requires-python = ">=3.12"  (the #809 break)
      ERROR: Package requires a different Python: 3.11.13 not in '>=3.12'

    # and against the repo's REAL training/rl lock, on the host:
    $ uv lock --check --python 3.12
      error: ... incompatible with the project's requires-python `==3.11.*`
  code_size: 12
  notes: This is not a claim on a slide; we ran it. Inside the actual Isaac image, the runtime interpreter is Python three-eleven-point-one-three. Install a dependency that requires three-twelve — the exact shape of eight-oh-nine — and the runtime rejects it at install time, on the CPU. The same mismatch fails a lock-check against the repo's real training lock. The interpreter class breaks before any GPU compute, so a CPU agent is enough to catch it. The harness is saved with this session.
- id: recommendation-phase-1a-1b
  kind: code
  accent: '#107C10'
  title: Recommendation — Phase 1a + 1b
  caption: 1a Tier 0 every PR · 1b Tier 1 real-image, path-gated · one fail-safe required check
  file: 'Proposed: .github/workflows/smoke-cpu.yml'
  code: |2

    jobs:
      smoke:
        runs-on: ubuntu-latest
        steps:
          - run: uv lock --check                       # resolution drift
          - run: uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          - run: python -c "import lerobot, torch"      # ABI / import smoke
          - run: ./training/rl/scripts/submit-osmo-training.sh --config-preview
          - uses: jlumbroso/free-disk-space@...
          - run: docker build -f evaluation/sil/docker/Dockerfile.lerobot-eval .
  code_size: 12.5
  notes: 'The recommendation is two named jobs. Phase one-a is Tier zero on every pull request: lock-check, a CPU-torch install so the heavy CUDA build does not block it, import smoke, a config-preview of the submit scripts, and the evaluation-image build. Phase one-b is Tier one, the real-image import, path-gated to the area that changed. Both sit behind one fail-safe required check. But state the limit plainly: this catches install, import, and interpreter drift. It cannot prove CUDA, Vulkan, MIG, or a real training loop — and that limit is exactly what Phase three exists to close.'
- id: safe-automation
  kind: section
  part: Phase 2
  title: Safe automation
  sub: Reclaim reviewer time without lowering the bar — ~$0
  notes: Phase two removes human toil from the safe path without weakening any gate. It auto-merges only the bumps that are provably trivial, and leaves everything riskier to scoped manual review.
- id: every-low-risk-bump-waits-on-a-human
  kind: bullets
  accent: '#C4314B'
  title: Every low-risk bump waits on a human
  body: |-
    - Dependabot cannot merge its own PRs — trivial patches queue for a click
    - High-risk and low-risk updates get identical, manual handling
    - ~24 PRs/week of reviewer toil, most of it trivial
  notes: The toil is concentrated in the safe path. Dependabot cannot merge its own pull requests, so every trivial patch waits for a maintainer's click, and high-risk and low-risk updates get the same manual handling — roughly twenty-four pull requests a week, most of them trivial. That is toil, not safety, and it is fixable without touching the safety bar.
- id: recommendation-auto-merge-scoped-tight
  kind: code
  accent: '#107C10'
  title: Recommendation — auto-merge, scoped tight
  caption: '`fetch-metadata` + `gh pr merge --auto` — patch-only, no runtime/GPU packages, no security'
  file: 'Proposed: auto-merge workflow'
  code: |2

    on: pull_request_target          # base context; do NOT checkout the PR head here
    permissions: { contents: write, pull-requests: write }   # NOT id-token
    jobs:
      automerge:
        steps:
          - uses: dependabot/fetch-metadata@<sha>   # reads metadata; runs no PR code
            id: meta
          - if: >                    # conservative scope: patch-only, dev/docs/actions
              steps.meta.outputs.update-type == 'version-update:semver-patch' &&
              steps.meta.outputs.dependency-type == 'direct:development'
            run: gh pr merge --auto --squash "$PR_URL"   # waits for green required checks
    # security PRs are never auto-merged; torch/cuda/isaac/numpy excluded by allowlist
  notes: 'Auto-merge the trivially safe, and only that — no agent, no inference. Dependabot''s fetch-metadata action reads the update type without running the pull request''s code; for a development patch it enables auto-merge, which waits for the required checks. The natural objection — won''t this cause incidents — is answered by scope: patch-only at first, development and docs and actions only, never a runtime or GPU package, never a security pull request, required checks green, and an instant-revert playbook. Everything riskier stays in scoped manual review.'
- id: gated-gpu-end-to-end-the-capstone
  kind: section
  part: Phase 3
  title: Gated GPU end-to-end — the capstone
  sub: The only tier that proves the GPU runtime — when funded
  notes: 'Phase three is the capstone: the only tier that can assert safe-to-merge on a GPU. Its blocker is a budget number, not a design.'
- id: the-gpu-half-is-never-proven
  kind: bullets
  accent: '#C4314B'
  title: The GPU half is never proven
  body: |-
    - Safe-to-merge cannot be asserted — nothing exercises the GPU runtime
    - Only real hardware catches CUDA / driver / Isaac Vulkan / MIG breaks
    - #958's device-ABI half passes every cheap tier, then breaks on the GPU
    - The blocker is funding: a dedicated, budget-capped GPU subscription
  notes: 'The cheap phases close the dependency and interpreter classes, but one class remains open. Only real hardware catches CUDA and driver breaks, Isaac''s Vulkan rendering, and MIG. Recall the failure map: nine-fifty-eight''s resolution half is caught early, but its device-ABI half passes every CPU tier and only fails on the GPU. Proving that half is what Phase three buys, and the only thing standing in the way is a funded, capped GPU subscription.'
- id: what-others-do-nemo-gates-the-gpu-run
  kind: code
  accent: '#5C2E91'
  title: What others do — NeMo gates the GPU run
  caption: Queue/human approval + fork mirroring — no pull_request_target
  file: NVIDIA-NeMo/NeMo · cicd-main.yml
  code: |2

    # NeMo gates the expensive GPU run behind a human/queue approval
    cicd-wait-in-queue:
      environment: test          # PAUSES until a reviewer/queue-bot approves
      # ...all GPU jobs `needs: [cicd-wait-in-queue]`
    # fork PRs are mirrored to `pull-request/NNN` branches by a bot,
    # so untrusted code never runs via pull_request_target ("pwn request")
    runner: nemo-ci-aws-gpu-x2   # self-hosted GPU; --gpus all
  code_size: 12
  notes: 'NeMo gates the expensive half cleanly. Every GPU job depends on a wait-in-queue job bound to a GitHub Environment, so nothing on a GPU starts until a reviewer or a queue bot approves it. And to run fork code safely, NeMo avoids the dangerous base-context trigger entirely — a bot mirrors fork pull requests onto internal branches, so untrusted code never executes with secrets in scope. Approval gate plus sandboxed execution: that is the shape we copy.'
- id: recommendation-the-gated-gpu-job
  kind: code
  accent: '#107C10'
  title: Recommendation — the gated GPU job
  caption: 'Two jobs: PR code renders a spec with no secrets; trusted base code submits after approval'
  file: 'Proposed: gated GPU e2e'
  code: |2

    # Two jobs: untrusted PR code never runs on the token-bearing runner.
    # Job A — on: pull_request (fork-safe: read-only token, NO secrets, no cloud login)
    jobs:
      render-spec:
        steps:
          - run: ./scripts/render-osmo-spec.sh > job.json   # build a constrained spec
          - uses: actions/upload-artifact@<sha>             # hand off job.json only
    # Job B — on: pull_request_review (approved) → runs TRUSTED base-branch workflow
      submit-gpu:
        if: github.event.review.state == 'approved'
        environment: e2e-approval        # required-reviewers gate releases OIDC
        steps:
          - uses: actions/checkout@<sha>            # BASE ref, not the PR head
          - uses: actions/download-artifact@<sha>   # the job.json from Job A
          - run: ./scripts/validate-spec.sh job.json   # allowlist-check before submit
          - uses: azure/login@v2                    # OIDC — minted only after approval
          - run: ./training/rl/scripts/submit-osmo.sh job.json  # PR code runs in the pool
  code_size: 11.5
  notes: The safety hinge is that contributor code never runs on the runner that holds the cloud token. Job A runs on the plain pull-request event — read-only, no secrets — and only renders a constrained job spec. Job B runs after an approving review, checks out the trusted base workflow rather than the pull request, validates the spec against an allowlist, mints an OIDC token through an Environment gate, and submits. The contributor's code runs inside the GPU pool, never on the privileged runner. That is the difference between a gate and a leak.
