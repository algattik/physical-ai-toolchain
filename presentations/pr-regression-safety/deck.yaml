slides:
- id: pr-regression-safety
  kind: title
  title: PR Regression Safety
  subtitle: Why green CI is not “safe to merge” — and the phased gate that fixes it
  sub2: Research findings · microsoft/physical-ai-toolchain · June 2026
  notes: This repository has a dependency-regression problem its green pipeline cannot see. Four of the five controls ship now without new spend; only the GPU end-to-end gate waits on a budget number. The next slide is the whole case in one statistic.
- id: green-ci-has-missed-every-costly-regression
  kind: stat
  accent: '#C4314B'
  title: Green CI has missed every costly regression
  stat: 8  vs  0
  statcap: Eight runtime regressions and test-integrity gaps reconstructed from this repo's own history — zero caught by the green, CPU-only pipeline.
  body: |-
    - Most are runtime, GPU, or interpreter specific — what CPU CI never exercises
    - Two were caused by CI itself: path-filter bugs switched tests off for weeks
    - In this project a green check has repeatedly meant nothing was actually tested
  notes: Eight distinct runtime regressions and test-integrity gaps were reconstructed from this project's history, and the green pipeline caught none of them. Most break on a real interpreter or a real GPU, which a CPU runner never touches. Two were caused by the pipeline itself, where a path filter quietly switched tests off for weeks. The decision this talk asks for follows directly from that zero.
- id: the-eight-in-one-place
  kind: deflist
  accent: '#C4314B'
  title: The eight, in one place
  caption: Five named failures carry the argument; the full catalogue is in the appendix
  label_w: 3.3
  label_size: 13.5
  desc_size: 13
  rows:
  - - '#809 — interpreter ABI'
    - RL lock resolved for Python 3.12 against a 3.11 runtime → four cascading ABI failures
  - - '#790 — LeRobot interpreter'
    - LeRobot needs Python ≥ 3.12 against an OSMO 3.11 runtime
  - - '#958 — torch / CUDA'
    - a torch 2.10→2.11 security bump pulled CUDA 13 bindings → libcudart break; live desync today
  - - '#691 / #547 — tests off'
    - path-filter bugs silently disabled fuzz, data-pipeline, and training tests for weeks
  - - churn
    - starlette churned 0.52→1.0→1.3 across ~7 dependency PRs and a downgrade-then-rebump in ~12 days
  notes: 'These five carry the rest of the talk, so they are worth a name. Eight-oh-nine and seven-ninety are interpreter mismatches: a lock resolved for one Python version against a runtime built on another. Nine-fifty-eight is a torch security bump that dragged in an incompatible CUDA runtime, and it still ships today because the lock pins one version while the pipeline force-installs another. Six-ninety-one and five-forty-seven are the pipeline disabling its own tests. And starlette shows the churn. Hold these five; every later recommendation maps back to them.'
- id: what-this-asks-for
  kind: bullets
  accent: '#0078D4'
  title: What this asks for
  body: |-
    - Phase 0 — risk-aware Dependabot grouping        · config only · ~$0
    - Phase 1 — GPU-free smoke gate on every PR        · standard runners · ~$0
    - Phase 2 — safe automation: auto-merge + review  · standard runners · ~$0
    - Phase 3 — gated GPU end-to-end (the capstone)    · funded GPU compute
    - Evidence: repo history, configs, PRs, and an executed prototype — cited in the appendix
  notes: The ask is four controls plus one capstone. Phases zero, one, and two are configuration and ordinary Actions runners — no Azure, no budget. Phase three is the only line that needs funded GPU compute, and it is the only one that can prove the GPU half of safe-to-merge. Each phase stands alone and reduces regressions on its own, so this is adopted incrementally, not as a single bet. Every claim that follows is grounded in the repo's own history and a prototype we ran.
- id: the-stack-under-test-why-this-repo-is-hard
  kind: deflist
  accent: '#0078D4'
  title: The stack under test — why this repo is hard
  caption: 'CI/CD generalists meet the robotics runtime: these concepts drive every later recommendation'
  label_w: 3.4
  label_size: 13.5
  desc_size: 13
  rows:
  - - Isaac Lab
    - GPU simulator (needs Vulkan); ships its own Python 3.11 runtime
  - - CUDA / driver ABI
    - torch and CUDA wheels are compiled contracts — they must match the GPU driver
  - - MIG
    - one datacentre GPU sliced into isolated instances; a config, not a library
  - - AzureML / OSMO
    - 'submit-and-poll: CI sends a job spec, a scale-from-zero GPU pool runs it'
  - - uv / uv.lock
    - fast resolver plus an exact pinned graph, one per subproject
  notes: This audience knows CI but not necessarily this runtime, so five terms first. Isaac Lab is a GPU simulator that needs Vulkan and ships its own Python three-eleven. CUDA and torch wheels are compiled contracts that must match the driver, which is why a version bump can break on device and nowhere else. MIG slices one GPU into isolated instances. AzureML and OSMO take a submitted job and run it on a pool that scales from zero. And uv produces an exact pinned lock per subproject. Every recommendation later turns on one of these five.
- id: dependency-intake-today
  kind: code
  accent: '#0078D4'
  title: Dependency intake today
  caption: 21 ecosystem blocks (9 uv · 3 npm · 4 Terraform · 3 Docker · 1 Go · 1 Actions), every group a wildcard
  file: .github/dependabot.yml
  code: |2

    updates:
    - package-ecosystem: uv
      directory: /training/rl
      groups:
        training-dependencies:
          patterns: ["*"]          # catch-all: no risk split
      ignore:
      - dependency-name: marshmallow
        versions: [">=4.0.0"]      # reactive pin, post-breakage
      schedule: { interval: weekly, day: monday }
    # ... repeated x21: npm, 10x uv, terraform, go, docker, actions
  notes: 'Dependencies arrive through twenty-one Dependabot blocks, and every group is a single wildcard catch-all, so nothing is split by risk: a harmless patch and a CUDA-breaking major look identical. The ignore-pins, like marshmallow here, were all added reactively, after something already broke. This is the intake that feeds the regressions.'
- id: 21-contexts-several-independent-runtimes
  kind: deflist
  accent: '#0078D4'
  title: 21 contexts = several independent runtimes
  caption: Not one app with one lock — the blast radius of a bump is wildly uneven
  label_w: 3.0
  label_size: 13.5
  desc_size: 12.5
  rows:
  - - Training · RL
    - Isaac Lab SKRL/RSL-RL (Py 3.11, numpy 1.26); AzureML + OSMO GPU jobs
  - - Training · IL
    - LeRobot ACT/Diffusion; full AzureML command-job + pipeline
  - - Evaluation · SIL
    - ONNX / Torch inference and the eval container image
  - - Dataviewer
    - FastAPI backend + React 19 frontend + 2 Docker images
  - - Infrastructure
    - 4 Terraform roots (AKS, DNS, VPN, automation) + Go contract tests
  notes: Those twenty-one blocks are not one application with one lockfile; they are several independent runtimes sharing a repository. Reinforcement learning on Isaac Lab pinned to Python three-eleven. Imitation learning on LeRobot. Evaluation and its container. A full web application. Four Terraform roots. The same version bump can be harmless in the React app and fatal in the Isaac training image — which is exactly why blind, uniform intake is dangerous here.
- id: ci-and-automation-today
  kind: code
  accent: '#0078D4'
  title: CI and automation today
  caption: All test CI is CPU-only; the torch pin desyncs from the lock; one advisory agent, read-only
  file: .github/workflows/pytest-training.yml
  code: |2

    jobs:
      test:
        runs-on: ubuntu-latest        # 4 vCPU - 16 GB - ~14 GB disk - NO GPU
        steps:
          - uses: actions/setup-python@...   # python-version: '3.12'
          - run: uv sync --group dev
          - run: uv pip install torch==2.11.0      # force-installed
    # training/il/lerobot/uv.lock pins torch 2.10.0  ->  live desync (#958)
  notes: 'Two facts complete the current picture. First, every test job runs on a standard CPU runner with no GPU, and it force-installs a torch version that disagrees with the committed lock — a live desync that ships today. Second, the only agentic workflow is an advisory Dependabot reviewer: a maintainer types a slash command, it reads, it comments, it never writes. So today''s automation is one read-only adviser on top of a pipeline that never touches a GPU.'
