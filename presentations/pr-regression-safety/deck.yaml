- id: primers-glossary
  kind: section
  part: Appendix A
  title: Primers & glossary
  sub: The tool concepts referenced throughout — pull up on demand
  notes: 'Appendix A is the tool primers and the glossary: the concepts the talk leans on, here for anyone who wants the definition behind a term.'
- id: primer-dependabot
  kind: primer
  accent: '#0078D4'
  title: Primer — Dependabot
  body: 'Dependabot has TWO independent update streams: scheduled VERSION updates (configured in `dependabot.yml`) and always-on, advisory-driven SECURITY updates (automatic — no config needed). Security PRs are never batched behind version updates. `groups:` batches, `ignore:` pins, `open-pull-requests-limit` caps noise, `cooldown` adds a stability window. It regenerates lockfiles natively.'
  terms: version vs security, group, ignore, cooldown, PR limit, lockfile
  file: .github/dependabot.yml
  code: |2

    # version updates (scheduled) — one stream
    - package-ecosystem: uv
      directory: /training/il/lerobot
      groups:                       # batch into 1 PR
        lerobot-deps: { patterns: ["*"] }
      ignore:                       # deliberate pin
      - dependency-name: torch
        versions: [">=2.11.0"]
      open-pull-requests-limit: 5
    # security updates = a SEPARATE, automatic stream
  notes: Dependabot has two independent update streams. Version updates keep packages current and are configured in dependabot.yml. Security updates are always on and automatic, triggered by advisories against your dependency graph, needing no configuration, and are never batched behind the version stream. Groups batch, ignore records deliberate pins, the limit caps noise, and a cooldown adds a stability window. It regenerates lockfiles natively.
- id: primer-uv-and-lockfiles
  kind: primer
  accent: '#0078D4'
  title: Primer — uv and lockfiles
  body: '`pyproject.toml` is the human-authored manifest (PEP 621). `uv.lock` is the resolver''s exact output — pinned versions, hashes, platform markers. A PR can edit the manifest but forget the lock, so this repo enforces `uv lock --check` as a CI gate.'
  terms: pyproject.toml, PEP 621, uv, uv.lock, resolver, lock drift
  file: pyproject.toml + uv.lock
  code: |2

    # pyproject.toml — human-authored (PEP 621)
    [project]
    requires-python = ">=3.12"
    dependencies = ["lerobot==0.5.1"]

    # uv.lock — resolver output: exact
    #   versions + hashes + platform markers
    # CI gate: `uv lock --check`  (no drift)
  notes: The manifest lists direct dependencies and the required Python version; the lock is the resolver's exact output, with hashes and markers. The danger is a pull request that edits the manifest but forgets the lock, so CI installs a different graph. A lock-check gate prevents that drift.
- id: primer-security-advisories-ghsa
  kind: primer
  accent: '#C4314B'
  title: Primer — security advisories (GHSA)
  body: A GHSA records a vulnerable package, its affected and patched versions, and a CVSS severity, usually linked to a CVE. When a vulnerable dependency is in your graph, Dependabot opens a security PR to the minimum patched version. These are fast-tracked by severity — never batched or held in a cooldown.
  terms: GHSA, CVE, CVSS, severity, advisory, patched version
  file: a GHSA, conceptually
  code: |2

    GHSA-xxxx-xxxx-xxxx   (-> a CVE)
    package:    urllib3
    vulnerable: < 2.7.0
    patched:    >= 2.7.0
    severity:   high   (CVSS)
    => security PR: bump to min patched
    => never batch / delay these
  notes: A GitHub Security Advisory records a vulnerable package, its patched version, and a severity, usually tied to a CVE. When such a package is in your graph, Dependabot opens a security pull request to the minimum patched version. Because these close known exposure, they are fast-tracked by severity, never batched. That separate fast lane recurs throughout the recommendations.
- id: primer-ci-gating-tiers
  kind: primer
  accent: '#107C10'
  title: Primer — CI gating tiers
  body: 'Cheap checks (lint, spell, lock-consistency) run on every PR; expensive checks run only when their area changed or a human releases them. This repo computes path booleans in one `changes` job and aggregates into ONE stable required check. The trap: a naive top-level `paths:` filter can leave a required check skipped — green having tested nothing.'
  terms: cheap vs expensive, path gate, required check, branch protection, aggregator
  file: .github/workflows/pr-validation.yml
  code: |2

    jobs:
      changes:                      # 1 cheap job computes booleans
        outputs: { training: ... }
      pytest-training:
        needs: changes
        if: needs.changes.outputs.training == 'true'
      pr-validation-summary:        # 1 stable required check
        if: always()                # aggregates everything
  notes: 'Good CI is tiered: cheap checks on every pull request, expensive checks only when their area changed. This repo computes path booleans in one job and aggregates into a single required check. The trap, which bit this repo twice, is a naive paths filter that leaves a required check skipped, so a pull request looks green having tested nothing. The aggregator must be fail-safe.'
- id: primer-running-untrusted-pr-code
  kind: primer
  accent: '#107C10'
  title: Primer — running untrusted PR code
  body: On `pull_request`, fork PRs get a read-only token and NO secrets — safe to build untrusted code. On `pull_request_target` the job runs in the base context WITH secrets; checking out the PR head there is the classic 'pwn request'. Gate real cloud access behind an Environment, and use OIDC with a tight federated policy.
  terms: fork PR, pull_request vs pull_request_target, pwn request, Environment, OIDC
  file: the safe pattern
  code: |2

    on: pull_request          # fork PR: read-only token, NO secrets  (safe)
    # on: pull_request_target # base context, HAS secrets -> "pwn request"
    jobs:
      gpu:
        environment: gpu-approved   # gate runs BEFORE any token is minted
        permissions: { contents: read, id-token: write }   # OIDC, no stored secret
        steps: [ { uses: azure/login@<sha> } ]
    # id-token:write is safe only if the cloud federated policy pins
    #   sub / aud / repo / environment — fork refs must NOT match it
  notes: A fork pull request is untrusted code. On the plain event it gets a read-only token and no secrets, so building it is safe. On the base-context event it has secrets, and running the contributor's head there is the classic pwn request. So gate genuine cloud access behind an Environment, and remember that the OIDC token is only as safe as the federated policy that pins which repo and environment may mint it.
- id: glossary
  kind: glossary
  accent: '#0078D4'
  title: Glossary
  rows:
  - - Dependabot
    - GitHub's native dependency-update bot
  - - Renovate
    - third-party update bot; cross-ecosystem config
  - - GHSA
    - GitHub Security Advisory for a vulnerability
  - - CVSS
    - standard 0-10 vulnerability severity score
  - - lockfile
    - pinned exact resolved dependency graph
  - - uv
    - fast Python resolver; reads pyproject, writes uv.lock
  - - PEP 621
    - standard [project] metadata in pyproject.toml
  - - semver
    - patch / minor / major compatibility levels
  - - required check
    - status check branch protection insists on
  - - OIDC
    - short-lived federated cloud login; no stored secret
  - - Environment
    - deploy target w/ required reviewers + secrets
  - - pull_request_target
    - base-context trigger WITH secrets (risky)
  - - MIG
    - one datacentre GPU sliced into isolated instances
  - - Vulkan
    - graphics API Isaac Sim needs to render
  - - ABI
    - compiled binary contract; mismatch crashes at runtime
  - - submit-and-poll
    - CI submits a job to a GPU pool, then waits
  - - smoke test
    - tiny fast check that the critical path works
  notes: A glossary to leave up for reference — the terms used through the talk, each in a line. Not read aloud.
