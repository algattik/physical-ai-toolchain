---
# Microsoft GRID Driver DaemonSet for Azure RTX PRO 6000 (vGPU) nodes
#
# The RTX PRO 6000 BSE in Azure uses SR-IOV vGPU passthrough (PCI ID 10de:2bb5)
# which requires the Microsoft GRID driver (v19.x vGPU Unified Driver) instead
# of the standard NVIDIA datacenter driver bundled with the GPU Operator.
#
# This DaemonSet runs on every node labeled nvidia.com/gpu.deploy.driver=false.
# An init container installs the GRID driver on the host via nsenter. The main
# container then sleeps, keeping the pod Running so the DaemonSet controller
# ensures new nodes (from scale-up or reimage) also receive the driver.
#
# The GPU Operator's driver DaemonSet is skipped on these nodes via the label.
# After the GRID driver is installed, the GPU Operator's toolkit, device-plugin,
# and validator components detect the pre-installed driver and proceed normally.
#
# Usage:
#   infrastructure/setup/01-deploy-robotics-charts.sh
#   kubectl create configmap gpu-grid-driver-installer-scripts -n gpu-operator \
#     --from-file=bootstrap-grid-driver-installer.sh=infrastructure/setup/scripts/gpu-grid-driver-installer/bootstrap-grid-driver-installer.sh \
#     --from-file=install-grid-driver.sh=infrastructure/setup/scripts/gpu-grid-driver-installer/install-grid-driver.sh \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f gpu-grid-driver-installer.yaml
# Monitor: kubectl logs -n gpu-operator -l app.kubernetes.io/name=gpu-grid-driver-installer -c installer
#
# Reference:
#   https://learn.microsoft.com/azure/virtual-machines/linux/n-series-driver-setup
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-grid-driver-installer
  namespace: gpu-operator
  labels:
    app.kubernetes.io/name: gpu-grid-driver-installer
    app.kubernetes.io/component: driver
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-grid-driver-installer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-grid-driver-installer
        app.kubernetes.io/component: driver
    spec:
      nodeSelector:
        nvidia.com/gpu.deploy.driver: "false"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      hostPID: true
      hostNetwork: true
      initContainers:
        - name: installer
          image: ubuntu:22.04@sha256:4f838adc7181d9039ac795a7d0aba05a9bd9ecd480d294483169c5def983b64d
          securityContext:
            privileged: true
          volumeMounts:
            - name: installer-scripts
              mountPath: /scripts
              readOnly: true
            - name: host-root
              mountPath: /host
          command: ["/bin/bash", "/scripts/bootstrap-grid-driver-installer.sh"]
      containers:
        - name: sleep
          image: registry.k8s.io/pause:3.10@sha256:ee6521f290b2168b6e0935a181d4cff9be1ac3f505666ef0e3c98fae8199917a
      volumes:
        - name: installer-scripts
          configMap:
            name: gpu-grid-driver-installer-scripts
            defaultMode: 0555
        - name: host-root
          hostPath:
            path: /
