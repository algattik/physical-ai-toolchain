workflow:
  name: isaaclab-inference
  timeout:
    exec_timeout: 2h
  resources:
    default:
      gpu: 1
      cpu: 20
      memory: 180Gi
      storage: 100Gi
      platform: gpu_platform
  tasks:
    - name: isaac-inference
      image: "{{ image }}"
      command: ["bash", "-euc"]
      args:
        - |
          base64 -d /tmp/entry.sh.b64 > /tmp/entry.sh
          [ -s /tmp/entry.sh ] || { echo "ERROR: /tmp/entry.sh is empty — submit via evaluation/sil/scripts/submit-osmo-eval.sh" >&2; exit 1; }
          exec bash /tmp/entry.sh
      inputs:
        - url: "{{ code_url }}"
          regex: ".*"
      environment:
        NVIDIA_DRIVER_CAPABILITIES: "all"
        TASK: "{{ task }}"
        NUM_ENVS: "{{ num_envs }}"
        MAX_STEPS: "{{ max_steps }}"
        VIDEO_LENGTH: "{{ video_length }}"
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
        PAYLOAD_ROOT: "{{ payload_root }}"
        OSMO_INPUT_0: "{{input:0}}"
        CHECKPOINT_URI: "{{ checkpoint_uri }}"
        INFERENCE_FORMAT: "{{ inference_format }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
        AZURE_RESOURCE_GROUP: "{{ azure_resource_group }}"
        AZUREML_WORKSPACE_NAME: "{{ azure_workspace_name }}"
        AZURE_STORAGE_ACCOUNT_NAME: "{{ azure_storage_account_name }}"
        AZURE_STORAGE_CONTAINER_NAME: "{{ azure_storage_container_name }}"
        AZURE_AUTHORITY_HOST: "{{ azure_authority_host }}"
        PYTHON: "{{ python }}"
      files:
        - path: /tmp/entry.sh.b64
          contents: "{{entry_script_b64}}"

default-values:
  # Submission scripts set image from scripts/lib/common.sh via --set-string.
  # This value is the direct-workflow fallback; keep it in sync with DEFAULT_ISAAC_LAB_IMAGE.
  image: nvcr.io/nvidia/isaac-lab:2.3.2@sha256:388dbc806f48359a964cb9f807feb226da95d0a107f470fdcad9780ea10fe6f2
  task: Isaac-Ant-v0
  num_envs: "4"
  max_steps: "500"
  video_length: "200"
  code_url: ""
  entry_script_b64: ""
  payload_root: /workspace/isaac_payload
  checkpoint_uri: ""
  inference_format: "both"
  azure_subscription_id: ""
  azure_resource_group: ""
  azure_workspace_name: ""
  azure_storage_account_name: ""
  azure_storage_container_name: "isaaclab-training-logs"
  azure_authority_host: https://login.microsoftonline.com
  python: "/workspace/isaaclab/isaaclab.sh -p"
