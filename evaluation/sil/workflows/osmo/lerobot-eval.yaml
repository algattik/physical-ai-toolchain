workflow:
  name: lerobot-inference
  timeout:
    exec_timeout: 2h
  resources:
    default:
      gpu: 1
      cpu: 4
      memory: 32Gi
      storage: 40Gi
      platform: gpu_platform
  tasks:
    - name: lerobot-eval
      image: "{{ image }}"
      command: ["bash", "-euc"]
      args:
        - |
          base64 -d /tmp/entry.sh.b64 > /tmp/entry.sh
          [ -s /tmp/entry.sh ] || { echo "ERROR: /tmp/entry.sh is empty — submit via evaluation/sil/scripts/submit-osmo-lerobot-eval.sh" >&2; exit 1; }
          exec bash /tmp/entry.sh
      inputs:
        - url: "{{ code_url }}"
          regex: ".*"
      credentials:
        huggingface:
          HF_TOKEN: hf_token
      environment:
        NVIDIA_DRIVER_CAPABILITIES: "all"
        POLICY_REPO_ID: "{{ policy_repo_id }}"
        POLICY_REVISION: "{{ policy_revision }}"
        POLICY_TYPE: "{{ policy_type }}"
        DATASET_REPO_ID: "{{ dataset_repo_id }}"
        DATASET_REVISION: "{{ dataset_revision }}"
        EVAL_EPISODES: "{{ eval_episodes }}"
        EVAL_BATCH_SIZE: "{{ eval_batch_size }}"
        OUTPUT_DIR: "{{ output_dir }}"
        JOB_NAME: "{{ job_name }}"
        LEROBOT_VERSION: "{{ lerobot_version }}"
        RECORD_VIDEO: "{{ record_video }}"
        MLFLOW_ENABLE: "{{ mlflow_enable }}"
        EXPERIMENT_NAME: "{{ experiment_name }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
        AZURE_RESOURCE_GROUP: "{{ azure_resource_group }}"
        AZUREML_WORKSPACE_NAME: "{{ azure_workspace_name }}"
        AZURE_AUTHORITY_HOST: "{{ azure_authority_host }}"
        MLFLOW_TRACKING_TOKEN_REFRESH_RETRIES: "{{ mlflow_token_refresh_retries }}"
        MLFLOW_HTTP_REQUEST_TIMEOUT: "{{ mlflow_http_request_timeout }}"
        REGISTER_MODEL: "{{ register_model }}"
        AML_MODEL_NAME: "{{ aml_model_name }}"
        AML_MODEL_VERSION: "{{ aml_model_version }}"
        BLOB_STORAGE_ACCOUNT: "{{ blob_storage_account }}"
        BLOB_STORAGE_CONTAINER: "{{ blob_storage_container }}"
        BLOB_PREFIX: "{{ blob_prefix }}"
        BUILTIN_POLICY: "{{ builtin_policy }}"
        PAYLOAD_ROOT: "{{ payload_root }}"
        OSMO_INPUT_0: "{{input:0}}"
      files:
        - path: /tmp/entry.sh.b64
          contents: "{{ entry_script_b64 }}"

default-values:
  # Submission scripts set image from scripts/lib/common.sh via --set-string.
  # This value is the direct-workflow fallback; keep it in sync with DEFAULT_LEROBOT_EVAL_IMAGE.
  image: pytorch/pytorch:2.4.1-cuda12.4-cudnn9-runtime@sha256:0a3b9fedefe1f61ac4d5a9de9015c0863db27ca0fde2d4e37e6268147980b726
  policy_repo_id: ""
  policy_revision: ""
  policy_type: act
  dataset_repo_id: ""
  dataset_revision: ""
  eval_episodes: "10"
  eval_batch_size: "10"
  output_dir: /workspace/outputs/eval
  job_name: lerobot-eval
  lerobot_version: ""
  record_video: "false"
  mlflow_enable: "false"
  experiment_name: ""
  azure_subscription_id: ""
  azure_resource_group: ""
  azure_workspace_name: ""
  azure_authority_host: https://login.microsoftonline.com
  mlflow_token_refresh_retries: "5"
  mlflow_http_request_timeout: "600"
  register_model: ""
  aml_model_name: ""
  aml_model_version: ""
  blob_storage_account: ""
  blob_storage_container: datasets
  blob_prefix: ""
  builtin_policy: "false"
  code_url: ""
  entry_script_b64: ""
  payload_root: /workspace/lerobot_payload
