version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
    day: monday
  groups:
    root-npm-dependencies:
      patterns:
      - "*"
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - npm
  commit-message:
    prefix: chore
    include: scope
