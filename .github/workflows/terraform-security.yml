name: Terraform Security Scan

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory passed to checkov via -d
        required: false
        type: string
        default: infrastructure/terraform
      soft-fail:
        description: Whether to continue on Checkov violations
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        continue-on-error: ${{ inputs.soft-fail }}
        with:
          directory: ${{ inputs.working-directory }}
          framework: terraform
          output_format: sarif
          soft_fail: ${{ inputs.soft-fail }}
          download_external_modules: false

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
          category: checkov

      - name: Upload Checkov SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkov-sarif
          path: results.sarif
          retention-days: 30
