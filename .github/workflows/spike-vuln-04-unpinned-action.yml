name: spike vuln 04 unpinned action

# Poutine-overlap probe: third-party actions referenced by mutable tag / branch.
# Poutine flags unpinned_action; test whether CodeQL security-extended flags these.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  use-unpinned:
    runs-on: ubuntu-latest
    steps:
      - name: Unpinned by major tag
        uses: actions/checkout@v4
      - name: Unpinned by branch
        uses: actions/setup-node@main
