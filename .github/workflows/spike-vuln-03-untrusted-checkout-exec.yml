name: spike vuln 03 untrusted checkout exec

# Dangerous: pull_request_target checks out untrusted PR head, then executes its code.
# Expected CodeQL rule: actions/untrusted-checkout (critical).
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout untrusted PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Build the checked-out code
        run: |
          npm ci
          npm run build --if-present
