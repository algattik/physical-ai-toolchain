name: spike vuln 10 unpinned third party

# Unpinned probe, third-party publishers (not actions/*). Sample 04 used first-party
# actions/* which CodeQL's unpinned-tag appears to exempt; test genuine third parties.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  use-unpinned-third-party:
    runs-on: ubuntu-latest
    steps:
      - name: Third-party action on a mutable branch
        uses: peter-evans/create-pull-request@main
      - name: Third-party action on a mutable major tag
        uses: dawidd6/action-download-artifact@v6
