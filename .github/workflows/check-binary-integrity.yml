name: Binary Integrity Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-hashes:
    name: Check Pinned Binary Hashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify pinned hashes
        shell: pwsh
        run: ./scripts/security/Test-BinaryFreshness.ps1 -SarifFile binary-freshness-results.sarif

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: binary-freshness-results.sarif
          category: binary-freshness
        continue-on-error: true
