name: CodeQL Security Analysis

on:
  push:
    branches: ['test/1154-codeql-actions']
  schedule:
    # Weekly scan: Sundays at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ['actions']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sarif-${{ matrix.language }}
          path: sarif-results/*.sarif
          if-no-files-found: warn

      - name: Add job summary
        if: always()
        run: |
          Import-Module $env:GITHUB_WORKSPACE/scripts/lib/Modules/CIHelpers.psm1
          $md = @(
            '## CodeQL Security Analysis Complete'
            '**Language:** ${{ matrix.language }}'
            '**Queries:** security-extended, security-and-quality'
            ''
            '📊 View results in the Security tab under Code Scanning'
          )
          Write-CIStepSummary -Content ($md -join "`n")
